<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toterstern Phone</title>
  <style>
    :root {
      --bg: #050505;
      --text: #f4efe5;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      position: relative;
      min-height: 100vh;
      background: #050505;
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("img-int/damask_exact_8x8-14.png?v=20260413-5") repeat top left;
      background-size: 314px 314px;
      pointer-events: none;
      opacity: 0.2;
    }

    @media (max-width: 640px) {
      body {
        background: #050505;
      }

      body::before {
        background-size: 157px 157px;
        opacity: 0.2;
      }
    }
  </style>
</head>
<body>
</body>
</html>
