<body>
  <div class="page-shell">
    <header class="site-header">
      <div>

      </div>
      <div class="page-status" aria-live="polite">
        <span id="spread-label">Page 1</span>

    </header>

    <main class="reader" id="top">
      <button class="nav-button nav-button-left" id="prev-button" type="button" aria-label="Previous spread">
        <img class="control-icon" src="img-int/s-left.png" alt="" aria-hidden="true">
      </button>

      <section class="book-stage" aria-label="Comic viewer">
        <div class="book-glow"></div>
        <button class="fullscreen-toggle" id="fullscreen-toggle" type="button" aria-label="Open fullscreen">
          <img class="control-icon fullscreen-toggle-open" src="img-int/fullscreen.png" alt="" aria-hidden="true">
          <span class="fullscreen-toggle-close" aria-hidden="true">×</span>
        </button>
        <button class="zoom-edge-action zoom-edge-action-top" id="zoom-prev-edge" type="button">
          <img class="zoom-edge-icon" src="img-int/lupa.png" alt="" aria-hidden="true">

        <button class="zoom-edge-action zoom-edge-action-bottom" id="zoom-next-edge" type="button">
          <img class="zoom-edge-icon" src="img-int/lupa.png" alt="" aria-hidden="true">
          <img class="zoom-edge-icon zoom-edge-arrow" src="img-int/s-right.png" alt="" aria-hidden="true">
          <span>вперёд</span>
        </button>
        <div class="tap-zone tap-zone-left" id="tap-left" aria-hidden="true"></div>
        <div class="tap-zone tap-zone-right" id="tap-right" aria-hidden="true"></div>
        <div class="spread" id="spread"></div>
      </section>

      <button class="nav-button nav-button-right" id="next-button" type="button" aria-label="Next spread">
        <img class="control-icon" src="img-int/s-right.png" alt="" aria-hidden="true">
      </button>
    </main>

    <footer class="reader-hint">
      <span>Left / Right</span>
      <span>Up to the beginning</span>
      <span>Down to the end</span>
    </footer>
